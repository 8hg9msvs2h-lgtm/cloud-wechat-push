name: 每日推送

on:
  # 定时触发已禁用 — 已回退到 WorkBuddy 本地 AI 自动化
  # schedule:
  #   - cron: "30 0 * * 1-5"
  #   - cron: "0 1 * * *"
  workflow_dispatch:
    inputs:
      task:
        description: "推送类型"
        required: true
        type: choice
        options:
          - stock
          - ai
          - all

jobs:
  push-stock:
    name: A股盘前资讯
    # 仅在周一至周五运行（手动触发除外）
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Stock Briefing
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: python main.py stock

  push-ai:
    name: AI新闻简报
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run AI News
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: python main.py ai
